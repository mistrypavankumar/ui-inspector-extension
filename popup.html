<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      padding: 18px 18px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #252542;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6950E8, #a78bfa);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 16px; height: 16px; fill: #fff; }
    .header-text h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 10.5px; color: #6a6a88; margin-top: 1px; }
    .actions { padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .15s;
    }
    .btn svg { width: 16px; height: 16px; fill: currentColor; }
    .btn-primary {
      background: linear-gradient(135deg, #6950E8, #7c5ce8); color: #fff;
      box-shadow: 0 2px 12px rgba(105,80,232,.25);
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(105,80,232,.4); }
    .btn-secondary {
      background: rgba(255,255,255,.04); color: #a78bfa;
      border: 1px solid rgba(105,80,232,.2);
    }
    .btn-secondary:hover { background: rgba(105,80,232,.1); }
    .footer {
      padding: 10px 18px; border-top: 1px solid #252542;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer span { font-size: 10px; color: #333; }
    .status { font-size: 10.5px; color: #6a6a88; text-align: center; padding: 0 18px 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </div>
    <div class="header-text">
      <h1>UI Inspector</h1>
      <p>Inspect any page's design tokens</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="inspect-btn">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Open Inspector
    </button>
    <button class="btn btn-secondary" id="picker-btn">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
      Pick Element
    </button>
  </div>

  <p class="status" id="status"></p>

  <div class="footer">
    <span>v1.0.0</span>
    <span id="status-dot"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
